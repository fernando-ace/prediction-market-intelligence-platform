services:
  postgres:
    image: postgres:16-alpine
    container_name: prediction-market-scanner-postgres
    environment:
      POSTGRES_DB: prediction_market_scanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - prediction-market-scanner-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prediction_market_scanner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prediction-market-scanner-pg:
